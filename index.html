<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemstone Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.35);
            font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
            text-align: center;
            pointer-events: none;
            user-select: none;
        }

        /* -------------------------------------------------- */
        /* Settings panel                                      */
        /* -------------------------------------------------- */
        :root {
            --sp-width: 272px;
            --sp-bg: rgba(0, 0, 0, 0.78);
            --sp-accent: rgba(255, 255, 255, 0.7);
            --sp-accent-dim: rgba(255, 255, 255, 0.25);
            --sp-font: 12px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI",
                Roboto, Helvetica, sans-serif;
        }

        /* Gear toggle */
        #settings-toggle {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 20;
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.5);
            font-size: 20px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #settings-toggle:hover,
        #settings-toggle.active {
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.85);
        }

        /* Slide-in panel */
        #settings-panel {
            position: absolute;
            top: 0;
            right: 0;
            z-index: 10;
            width: var(--sp-width);
            height: 100%;
            overflow-y: auto;
            padding: 60px 18px 24px;
            background: var(--sp-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            font: var(--sp-font);
            color: var(--sp-accent);
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }
        #settings-panel.open {
            transform: translateX(0);
        }

        /* Scrollbar */
        #settings-panel::-webkit-scrollbar { width: 4px; }
        #settings-panel::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.12);
            border-radius: 2px;
        }

        /* Group */
        .settings-group {
            margin-bottom: 20px;
        }
        .group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .group-header h3 {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--sp-accent-dim);
            margin: 0;
        }
        .group-reset {
            background: none;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 4px;
            color: rgba(255,255,255,0.35);
            font-size: 10px;
            padding: 2px 7px;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s;
        }
        .group-reset:hover {
            color: rgba(255,255,255,0.7);
            border-color: rgba(255,255,255,0.3);
        }

        /* Slider row */
        .slider-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .slider-label {
            flex: 0 0 80px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.55);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .slider-value {
            flex: 0 0 44px;
            flex-shrink: 0;
            text-align: right;
            font-size: 11px;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
            color: rgba(255, 255, 255, 0.75);
        }

        /* Range input — track + thumb */
        .slider-row input[type="range"] {
            flex: 1 1 0;
            min-width: 0;
            -webkit-appearance: none;
            appearance: none;
            height: 3px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        .slider-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.7);
            border: none;
            box-shadow: 0 0 4px rgba(255,255,255,0.15);
            transition: background 0.15s;
        }
        .slider-row input[type="range"]::-webkit-slider-thumb:hover {
            background: #fff;
        }
        .slider-row input[type="range"]::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.7);
            border: none;
        }
        .slider-row input[type="range"]::-moz-range-track {
            height: 3px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 2px;
            border: none;
        }

        /* Narrow viewports: wider panel */
        @media (max-width: 600px) {
            #settings-panel {
                width: 100%;
            }
        }

        /* -------------------------------------------------- */
        /* Gem selector                                         */
        /* -------------------------------------------------- */
        #gem-selector {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 10px;
            user-select: none;
        }
        #gem-selector button {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
        }
        #gem-selector button:hover {
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.85);
        }
        #gem-name {
            font: 600 13px/1 -apple-system, BlinkMacSystemFont, "Segoe UI",
                Roboto, Helvetica, sans-serif;
            color: rgba(255, 255, 255, 0.6);
            min-width: 120px;
            text-align: center;
            letter-spacing: 0.03em;
        }
    </style>
    <!-- Import map: Three.js r170 from CDN, zero build tools -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="info">Drag to orbit &middot; Scroll to zoom &middot; <b>S</b> settings &middot; <b>&larr; &rarr;</b> gems</div>

    <!-- Gem selector -->
    <div id="gem-selector">
        <button id="gem-prev" aria-label="Previous gemstone">&#9664;</button>
        <span id="gem-name">Diamond</span>
        <button id="gem-next" aria-label="Next gemstone">&#9654;</button>
    </div>

    <!-- Settings toggle -->
    <button id="settings-toggle" aria-label="Settings" aria-expanded="false">&#9881;</button>

    <!-- Settings panel -->
    <div id="settings-panel">

        <!-- Bloom -->
        <div class="settings-group">
            <div class="group-header">
                <h3>Bloom</h3>
                <button class="group-reset">Reset</button>
            </div>
            <div class="slider-row">
                <span class="slider-label">Strength</span>
                <input type="range" min="0" max="3" step="0.01"
                       data-target="bloomPass" data-prop="strength" data-default="0.30">
                <span class="slider-value">0.30</span>
            </div>
            <div class="slider-row">
                <span class="slider-label">Radius</span>
                <input type="range" min="0" max="1" step="0.01"
                       data-target="bloomPass" data-prop="radius" data-default="0.4">
                <span class="slider-value">0.40</span>
            </div>
            <div class="slider-row">
                <span class="slider-label">Threshold</span>
                <input type="range" min="0" max="1" step="0.01"
                       data-target="bloomPass" data-prop="threshold" data-default="0.85">
                <span class="slider-value">0.85</span>
            </div>
        </div>

        <!-- Exposure -->
        <div class="settings-group">
            <div class="group-header">
                <h3>Exposure</h3>
                <button class="group-reset">Reset</button>
            </div>
            <div class="slider-row">
                <span class="slider-label">Exposure</span>
                <input type="range" min="0.1" max="3" step="0.01"
                       data-target="renderer" data-prop="toneMappingExposure" data-default="0.10">
                <span class="slider-value">0.10</span>
            </div>
        </div>

        <!-- Reflection -->
        <div class="settings-group">
            <div class="group-header">
                <h3>Reflection</h3>
                <button class="group-reset">Reset</button>
            </div>
            <div class="slider-row">
                <span class="slider-label">Env Intensity</span>
                <input type="range" min="0" max="5" step="0.1"
                       data-target="material" data-prop="envMapIntensity" data-default="2.5">
                <span class="slider-value">2.5</span>
            </div>
            <div class="slider-row">
                <span class="slider-label">Specular</span>
                <input type="range" min="0" max="2" step="0.01"
                       data-target="material" data-prop="specularIntensity" data-default="1.0">
                <span class="slider-value">1.00</span>
            </div>
            <div class="slider-row">
                <span class="slider-label">Clearcoat</span>
                <input type="range" min="0" max="1" step="0.01"
                       data-target="material" data-prop="clearcoat" data-default="1.0">
                <span class="slider-value">1.00</span>
            </div>
        </div>

        <!-- Refraction -->
        <div class="settings-group">
            <div class="group-header">
                <h3>Refraction</h3>
                <button class="group-reset">Reset</button>
            </div>
            <div class="slider-row">
                <span class="slider-label">IOR</span>
                <input type="range" min="1" max="3" step="0.01"
                       data-target="material" data-prop="ior" data-default="2.42">
                <span class="slider-value">2.42</span>
            </div>
            <div class="slider-row">
                <span class="slider-label">Dispersion</span>
                <input type="range" min="0" max="0.2" step="0.001"
                       data-target="material" data-prop="dispersion" data-default="0.044">
                <span class="slider-value">0.044</span>
            </div>
            <div class="slider-row">
                <span class="slider-label">Thickness</span>
                <input type="range" min="0.1" max="5" step="0.1"
                       data-target="material" data-prop="thickness" data-default="2.0">
                <span class="slider-value">2.0</span>
            </div>
        </div>

    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
